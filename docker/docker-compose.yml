version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: licenseserver_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: licenseserver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      POSTGRES_DB: licenseserver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U licenseserver"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - licenseserver_network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: licenseserver_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://licenseserver:${POSTGRES_PASSWORD:-changeme_secure_password}@postgres:5432/licenseserver?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production_min_32_chars}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_in_production_min_32}
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    networks:
      - licenseserver_network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    container_name: licenseserver_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - licenseserver_network

  nginx:
    image: nginx:alpine
    container_name: licenseserver_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - licenseserver_network

volumes:
  postgres_data:

networks:
  licenseserver_network:
    driver: bridge
